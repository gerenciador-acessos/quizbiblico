<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico - Show do Saber</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #cc1a1a;
    --red-dark: #8b0000;
    --red-light: #e83232;
    --gold: #f5c518;
    --gold-dark: #c9a000;
    --blue-bg: #0a1628;
    --blue-mid: #0d2244;
    --blue-light: #1a3a6e;
    --white: #ffffff;
    --correct: #27ae60;
    --wrong: #e74c3c;
    --option-bg: linear-gradient(135deg, #8b0000 0%, #cc1a1a 50%, #a01010 100%);
    --option-hover: linear-gradient(135deg, #b02020 0%, #e83232 50%, #c01818 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Oswald', sans-serif;
    background: var(--blue-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(26,58,110,0.4) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(26,58,110,0.4) 0%, transparent 60%),
      linear-gradient(180deg, #0a1628 0%, #0d1f3c 50%, #0a1628 100%);
    z-index: -2;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 4px
    );
    z-index: -1;
    pointer-events: none;
  }

  /* SCREENS */
  .screen { display: none; width: 100%; max-width: 900px; padding: 20px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ======== START SCREEN ======== */
  #start-screen { text-align: center; gap: 30px; }

  .logo-container {
    position: relative;
    display: inline-block;
  }
  .logo-main {
    font-size: 52px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,197,24,0.8), 3px 3px 0 #7a5f00, -1px -1px 0 #c9a000;
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
    animation: pulse-glow 2s ease-in-out infinite;
  }
  .logo-sub {
    font-size: 22px;
    color: var(--white);
    letter-spacing: 8px;
    margin-top: -5px;
    text-shadow: 0 0 15px rgba(255,255,255,0.5);
  }

  @keyframes pulse-glow {
    0%,100% { text-shadow: 0 0 30px rgba(245,197,24,0.8), 3px 3px 0 #7a5f00; }
    50% { text-shadow: 0 0 60px rgba(245,197,24,1), 3px 3px 0 #7a5f00, 0 0 100px rgba(245,197,24,0.4); }
  }

  .coin-icon {
    font-size: 80px;
    animation: spin-slow 4s linear infinite;
    display: block;
    margin: 0 auto;
    filter: drop-shadow(0 0 20px rgba(245,197,24,0.8));
  }
  @keyframes spin-slow {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }

  .difficulty-selector {
    background: rgba(255,255,255,0.05);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 25px 40px;
    width: 100%;
    max-width: 500px;
  }
  .difficulty-selector h3 {
    color: var(--gold);
    font-size: 20px;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }
  .diff-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .diff-btn {
    padding: 10px 20px;
    border: 2px solid;
    border-radius: 8px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .diff-btn[data-diff="facil"] { border-color: #27ae60; color: #27ae60; background: rgba(39,174,96,0.1); }
  .diff-btn[data-diff="medio"] { border-color: var(--gold); color: var(--gold); background: rgba(245,197,24,0.1); }
  .diff-btn[data-diff="dificil"] { border-color: #e74c3c; color: #e74c3c; background: rgba(231,76,60,0.1); }
  .diff-btn[data-diff="todos"] { border-color: #9b59b6; color: #9b59b6; background: rgba(155,89,182,0.1); }
  .diff-btn.selected { color: #fff; }
  .diff-btn[data-diff="facil"].selected { background: #27ae60; }
  .diff-btn[data-diff="medio"].selected { background: var(--gold-dark); color: #000; }
  .diff-btn[data-diff="dificil"].selected { background: #e74c3c; }
  .diff-btn[data-diff="todos"].selected { background: #9b59b6; }

  .start-btn {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    color: #1a0000;
    border: none;
    padding: 18px 60px;
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 8px 30px rgba(245,197,24,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: all 0.2s;
    animation: btn-pulse 2s ease-in-out infinite;
  }
  .start-btn:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(245,197,24,0.7); }
  @keyframes btn-pulse {
    0%,100% { box-shadow: 0 8px 30px rgba(245,197,24,0.5); }
    50% { box-shadow: 0 8px 50px rgba(245,197,24,0.9); }
  }

  .stats-box {
    display: flex;
    gap: 30px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    letter-spacing: 1px;
  }
  .stats-box span { color: var(--gold); font-weight: 700; font-size: 20px; }

  /* ======== GAME SCREEN ======== */
  #game-screen { gap: 15px; }

  .top-bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
  }

  .level-badge {
    background: linear-gradient(135deg, var(--red-dark), var(--red));
    border: 2px solid var(--gold);
    border-radius: 8px;
    padding: 8px 18px;
    text-align: center;
  }
  .level-badge .level-label { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
  .level-badge .level-num { font-size: 22px; font-weight: 700; color: var(--gold); line-height: 1; }

  .score-display {
    background: linear-gradient(135deg, #0d2244, #1a3a6e);
    border: 2px solid var(--gold);
    border-radius: 8px;
    padding: 8px 18px;
    text-align: center;
  }
  .score-display .score-label { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
  .score-display .score-num { font-size: 22px; font-weight: 700; color: var(--gold); line-height: 1; }

  /* TIMER */
  .timer-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .timer-circle {
    position: relative;
    width: 90px;
    height: 90px;
  }
  .timer-circle svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .timer-circle .bg-circle { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
  .timer-circle .progress-circle {
    fill: none;
    stroke: var(--gold);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 251;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  .timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(245,197,24,0.5);
    transition: color 0.5s;
  }

  .timer-bar-wrapper {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, #27ae60, var(--gold), #e74c3c);
    border-radius: 4px;
    transition: width 1s linear;
    width: 100%;
  }

  /* LOGO inline */
  .game-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(245,197,24,0.5);
    text-transform: uppercase;
  }

  /* DIFFICULTY INDICATOR */
  .diff-indicator {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .diff-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .diff-dot.active { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .diff-dot.active.med { background: #f39c12; }
  .diff-dot.active.hard { background: #e74c3c; }

  /* QUESTION BOX */
  .question-box {
    width: 100%;
    background: linear-gradient(135deg, rgba(139,0,0,0.85) 0%, rgba(180,20,20,0.85) 50%, rgba(120,0,0,0.85) 100%);
    border: 3px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 25px 30px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .question-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .question-number {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .question-text {
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.4;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* OPTIONS */
  .options-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--option-bg);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  .option-btn:not(:disabled):hover {
    background: var(--option-hover);
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 15px rgba(245,197,24,0.3);
  }
  .option-btn:disabled { cursor: not-allowed; }

  .option-num {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .option-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }

  .option-btn.correct {
    background: linear-gradient(135deg, #1a6b35, #27ae60, #1a6b35) !important;
    border-color: #2ecc71 !important;
    box-shadow: 0 0 30px rgba(39,174,96,0.6) !important;
    animation: correct-flash 0.5s ease;
  }
  .option-btn.wrong {
    background: linear-gradient(135deg, #7b1515, #e74c3c, #7b1515) !important;
    border-color: #ff6b6b !important;
    animation: shake 0.5s ease;
  }
  .option-btn.reveal {
    background: linear-gradient(135deg, #1a6b35, #27ae60, #1a6b35) !important;
    border-color: #2ecc71 !important;
    opacity: 0.7;
  }

  @keyframes correct-flash {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* BOTTOM BARS */
  .bottom-info {
    width: 100%;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .info-pill {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    min-width: 100px;
  }
  .pill-errar { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
  .pill-parar { background: rgba(245,197,24,0.15); border: 2px solid var(--gold); color: var(--gold); cursor: pointer; transition: all 0.2s; }
  .pill-parar:hover { background: var(--gold); color: #000; }
  .pill-acertar { background: rgba(39,174,96,0.15); border: 2px solid #27ae60; color: #27ae60; }

  /* Streak indicator */
  .streak-bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .streak-label { font-size: 12px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
  .streak-dots { display: flex; gap: 5px; }
  .sdot {
    width: 12px; height: 12px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .sdot.lit { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

  /* ======== RESULT SCREEN ======== */
  #result-screen { text-align: center; gap: 20px; }

  .result-icon { font-size: 80px; animation: bounce 0.6s ease; }
  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .result-title { font-size: 42px; font-weight: 700; color: var(--gold); text-shadow: 0 0 30px rgba(245,197,24,0.5); }
  .result-subtitle { font-size: 18px; color: rgba(255,255,255,0.7); letter-spacing: 2px; }

  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    width: 100%;
    max-width: 500px;
  }
  .result-stat {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 15px;
  }
  .result-stat .rs-num { font-size: 32px; font-weight: 700; color: var(--gold); }
  .result-stat .rs-label { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; }

  .result-answer-box {
    background: rgba(39,174,96,0.15);
    border: 2px solid #27ae60;
    border-radius: 10px;
    padding: 15px 25px;
    max-width: 500px;
    width: 100%;
  }
  .result-answer-box.wrong-box { background: rgba(231,76,60,0.15); border-color: #e74c3c; }
  .rab-label { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 5px; }
  .rab-text { font-size: 18px; font-weight: 700; color: #fff; }

  .action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
  .action-btn {
    padding: 15px 35px;
    border-radius: 50px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-next { background: var(--gold); color: #1a0000; border: none; box-shadow: 0 5px 20px rgba(245,197,24,0.4); }
  .btn-next:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(245,197,24,0.6); }
  .btn-restart { background: transparent; color: rgba(255,255,255,0.7); border: 2px solid rgba(255,255,255,0.3); }
  .btn-restart:hover { border-color: var(--white); color: var(--white); }

  /* ======== EFFECTS ======== */
  #effects-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .wrong-overlay {
    position: fixed;
    inset: 0;
    background: rgba(231,76,60,0);
    animation: wrong-flash 1s ease forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes wrong-flash {
    0% { background: rgba(231,76,60,0); }
    20% { background: rgba(231,76,60,0.3); }
    40% { background: rgba(231,76,60,0.1); }
    60% { background: rgba(231,76,60,0.25); }
    80% { background: rgba(231,76,60,0.05); }
    100% { background: rgba(231,76,60,0); }
  }

  .timeout-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 998;
    animation: fadein 0.3s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .timeout-box {
    background: linear-gradient(135deg, #1a0000, #3d0000);
    border: 3px solid #e74c3c;
    border-radius: 20px;
    padding: 40px 60px;
    text-align: center;
    box-shadow: 0 0 60px rgba(231,76,60,0.5);
  }
  .timeout-icon { font-size: 60px; animation: spin-fast 0.3s ease; }
  @keyframes spin-fast { from { transform: rotate(-10deg) scale(0.8); } to { transform: rotate(0) scale(1); } }
  .timeout-text { font-size: 36px; font-weight: 700; color: #e74c3c; margin: 10px 0; }
  .timeout-sub { color: rgba(255,255,255,0.7); letter-spacing: 2px; }

  /* Loading */
  .loading-api {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    padding: 40px;
  }
  .loading-spinner {
    width: 50px; height: 50px;
    border: 4px solid rgba(245,197,24,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--gold); font-size: 18px; letter-spacing: 2px; }

  /* Animations for screen transitions */
  .slide-in { animation: slideIn 0.4s ease forwards; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Progress bar at very top */
  .progress-container {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    .question-text { font-size: 18px; }
    .logo-main { font-size: 36px; }
    .result-stats { grid-template-columns: 1fr 1fr; }
    .option-text { font-size: 14px; }
  }
</style>
</head>
<body>

<div id="effects-layer"></div>

<!-- ===== START SCREEN ===== -->
<div id="start-screen" class="screen active">
  <div class="logo-container">
    <span class="coin-icon">✝️</span>
    <div class="logo-main">QUIZ BÍBLICO</div>
    <div class="logo-sub">DO SABER</div>
  </div>

  <div class="difficulty-selector">
    <h3>ESCOLHA A DIFICULDADE</h3>
    <div class="diff-buttons">
      <button class="diff-btn selected" data-diff="todos" onclick="selectDiff(this)">TODAS</button>
      <button class="diff-btn" data-diff="facil" onclick="selectDiff(this)">FÁCIL</button>
      <button class="diff-btn" data-diff="medio" onclick="selectDiff(this)">MÉDIO</button>
      <button class="diff-btn" data-diff="dificil" onclick="selectDiff(this)">DIFÍCIL</button>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">▶ JOGAR AGORA</button>

  <div class="stats-box">
    <div>📖 <span>3000</span><br>PERGUNTAS</div>
    <div>⏱️ <span>60s</span><br>POR QUESTÃO</div>
    <div>🏆 <span>3</span><br>NÍVEIS</div>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">

<script>
// ===================== SOUND ENGINE =====================
const SFX = (() => {
  let ctx = null;
  let tickInterval = null;
  let muted = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function osc(freq, type, startT, dur, gainVal, endGain = 0, endTime = null) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, startT);
    g.gain.setValueAtTime(gainVal, startT);
    g.gain.linearRampToValueAtTime(endGain, endTime ?? (startT + dur));
    o.start(startT);
    o.stop(endTime ?? (startT + dur));
  }

  function noise(startT, dur, gainVal) {
    const c = getCtx();
    const bufSize = c.sampleRate * dur;
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buf;
    const g = c.createGain();
    const filt = c.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = 1200;
    filt.Q.value = 0.5;
    src.connect(filt); filt.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(gainVal, startT);
    g.gain.exponentialRampToValueAtTime(0.001, startT + dur);
    src.start(startT); src.stop(startT + dur);
  }

  return {
    toggleMute() {
      muted = !muted;
      const btn = document.getElementById('mute-btn');
      if (btn) btn.textContent = muted ? '🔇' : '🔊';
    },

    // Tique-taque a cada segundo
    startTick() {
      if (tickInterval) clearInterval(tickInterval);
      tickInterval = setInterval(() => {
        if (muted) return;
        const c = getCtx();
        const t = c.currentTime;
        // Som de relógio analógico: dois transientes curtos (tick + tack)
        noise(t, 0.04, 0.18);
        osc(2800, 'square', t, 0.03, 0.06, 0);
      }, 1000);
    },

    stopTick() {
      if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
    },

    // Tique-taque urgente nos últimos 10 segundos
    urgentTick() {
      if (muted) return;
      const c = getCtx();
      const t = c.currentTime;
      noise(t, 0.035, 0.28);
      osc(3400, 'square', t, 0.035, 0.09, 0);
      // Eco leve
      noise(t + 0.05, 0.02, 0.09);
    },

    // Palmas quando acerta
    applause() {
      if (muted) return;
      const c = getCtx();
      const t = c.currentTime;

      // Fanfarra de vitória: arpejo ascendente
      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        osc(freq, 'sine', t + i * 0.12, 0.35, 0.22, 0, t + i * 0.12 + 0.35);
        osc(freq * 2, 'sine', t + i * 0.12, 0.2, 0.06, 0, t + i * 0.12 + 0.2);
      });

      // Simulação de palmas: bursts de ruído
      for (let i = 0; i < 12; i++) {
        const delay = t + 0.5 + i * 0.08 + Math.random() * 0.04;
        noise(delay, 0.06 + Math.random() * 0.04, 0.12 + Math.random() * 0.08);
      }
      // Segunda rodada de palmas
      for (let i = 0; i < 10; i++) {
        const delay = t + 1.5 + i * 0.09 + Math.random() * 0.05;
        noise(delay, 0.05 + Math.random() * 0.04, 0.08 + Math.random() * 0.07);
      }

      // Acorde final festivo
      [523.25, 659.25, 783.99].forEach(freq => {
        osc(freq, 'sine', t + 0.55, 0.5, 0.15, 0, t + 1.05);
      });
    },

    // Som de erro / buzzer
    wrong() {
      if (muted) return;
      const c = getCtx();
      const t = c.currentTime;

      // Buzzer descendente clássico
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(380, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.6);
      g.gain.setValueAtTime(0.35, t);
      g.gain.linearRampToValueAtTime(0, t + 0.7);
      o.start(t); o.stop(t + 0.7);

      // Sub-bass punch
      osc(60, 'sine', t, 0.3, 0.4, 0);
      // Dissonância
      osc(340, 'square', t, 0.25, 0.08, 0);
    },

    // Som de tempo esgotado
    timeout() {
      if (muted) return;
      const c = getCtx();
      const t = c.currentTime;
      // Sirene descendente tripla
      [0, 0.3, 0.6].forEach(d => {
        const o = c.createOscillator();
        const g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(600, t + d);
        o.frequency.linearRampToValueAtTime(200, t + d + 0.25);
        g.gain.setValueAtTime(0.25, t + d);
        g.gain.linearRampToValueAtTime(0, t + d + 0.28);
        o.start(t + d); o.stop(t + d + 0.3);
      });
    },

    // Clique ao selecionar opção
    click() {
      if (muted) return;
      const c = getCtx();
      const t = c.currentTime;
      osc(880, 'sine', t, 0.05, 0.12, 0);
    },

    // Som ao iniciar jogo
    start() {
      if (muted) return;
      const c = getCtx();
      const t = c.currentTime;
      const melody = [261.63, 329.63, 392, 523.25];
      melody.forEach((f, i) => {
        osc(f, 'sine', t + i * 0.1, 0.25, 0.18, 0, t + i * 0.1 + 0.25);
      });
    }
  };
})();

// ===================== STATE =====================
let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  totalAnswered: 0,
  totalCorrect: 0,
  streak: 0,
  maxStreak: 0,
  difficulty: 'todos',
  timerInterval: null,
  timeLeft: 60,
  answerLocked: false,
  currentQuestion: null,
  level: 1,
  questionsPerLevel: 10,
  isLoadingQuestion: false,
  usedQuestions: new Set(),
};

// ===================== DIFFICULTY =====================
function selectDiff(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.difficulty = btn.dataset.diff;
}

// ===================== GAME FLOW =====================
function startGame() {
  state.questions = shuffle([...BASE_QUESTIONS]);
  if (state.difficulty !== 'todos') {
    state.questions = state.questions.filter(q => q.d === state.difficulty);
  }
  state.currentIndex = 0;
  state.score = 0;
  state.totalAnswered = 0;
  state.totalCorrect = 0;
  state.streak = 0;
  state.level = 1;
  state.usedQuestions = new Set();

  showScreen('game-screen');
  SFX.start();
  loadQuestion();
}

async function loadQuestion() {
  state.answerLocked = false;
  state.isLoadingQuestion = true;
  clearTimer();

  // Update level based on answered questions
  state.level = Math.floor(state.totalAnswered / state.questionsPerLevel) + 1;
  document.getElementById('level-display').textContent = state.level;
  document.getElementById('score-display').textContent = state.score;

  // Calculate points for this question
  const pts = getPoints();
  document.getElementById('pts-display').textContent = `✅ +${pts} pts`;

  // Progress
  const pct = Math.min((state.totalAnswered / 3000) * 100, 100);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Difficulty dots
  renderDiffDots();
  renderStreakDots();

  // Get question
  let q = getNextQuestion();
  if (!q) {
    // Need more questions from API
    const apiQ = await fetchQuestionFromAPI();
    if (apiQ) {
      q = apiQ;
    } else {
      // Fallback: recycle
      state.questions = shuffle([...BASE_QUESTIONS]);
      if (state.difficulty !== 'todos') {
        state.questions = state.questions.filter(q2 => q2.d === state.difficulty);
      }
      state.currentIndex = 0;
      q = state.questions[state.currentIndex++];
    }
  }

  state.currentQuestion = q;
  state.isLoadingQuestion = false;
  renderQuestion(q);
  startTimer();
}

function getNextQuestion() {
  while (state.currentIndex < state.questions.length) {
    const q = state.questions[state.currentIndex++];
    const key = q.q.substring(0,30);
    if (!state.usedQuestions.has(key)) {
      state.usedQuestions.add(key);
      return q;
    }
  }
  return null;
}

async function fetchQuestionFromAPI() {
  const diffMap = { todos: 'variados', facil: 'fáceis', medio: 'médios', dificil: 'difíceis' };
  const diffLabel = diffMap[state.difficulty] || 'variados';
  const level = state.level;

  const prompt = `Gere 1 pergunta de quiz bíblico de nível ${level >= 5 ? 'difícil' : level >= 3 ? 'médio' : 'fácil'} (${diffLabel}).
Responda APENAS com JSON válido neste formato exato, sem explicações:
{"q":"pergunta aqui?","o":["opção1","opção2","opção3","opção4"],"a":0,"d":"facil"}
Onde "a" é o índice (0-3) da resposta correta e "d" é "facil", "medio" ou "dificil".
A pergunta deve ser sobre a Bíblia, diferente e interessante.`;

  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    if (parsed.q && parsed.o && parsed.o.length === 4 && parsed.a !== undefined) {
      return parsed;
    }
  } catch(e) { /* silently fail */ }
  return null;
}

function renderQuestion(q) {
  document.getElementById('q-number').textContent = `QUESTÃO ${state.totalAnswered + 1}`;
  document.getElementById('question-text').textContent = q.q;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const labels = ['1', '2', '3', '4'];
  q.o.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `
      <div class="option-num">${labels[i]}</div>
      <div class="option-text">${opt}</div>
    `;
    btn.onclick = () => { SFX.click(); answerQuestion(i, btn, q); };
    grid.appendChild(btn);
  });

  // Animate in
  document.getElementById('question-box').classList.add('slide-in');
  setTimeout(() => document.getElementById('question-box').classList.remove('slide-in'), 400);
}

function answerQuestion(index, btn, q) {
  if (state.answerLocked) return;
  state.answerLocked = true;
  clearTimer();
  state.totalAnswered++;

  const correct = q.a;
  const allBtns = document.querySelectorAll('.option-btn');

  allBtns.forEach(b => b.disabled = true);

  if (index === correct) {
    // CORRECT
    btn.classList.add('correct');
    state.totalCorrect++;
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    const pts = getPoints();
    state.score += pts;
    renderStreakDots();
    SFX.stopTick();
    SFX.applause();
    setTimeout(() => launchConfetti(), 200);
    setTimeout(() => showResult(true, q), 1500);
  } else {
    // WRONG
    btn.classList.add('wrong');
    allBtns[correct].classList.add('correct');
    state.streak = 0;
    renderStreakDots();
    SFX.stopTick();
    SFX.wrong();
    setTimeout(() => launchWrongEffect(), 100);
    setTimeout(() => showResult(false, q), 1500);
  }
}

function timeUp() {
  if (state.answerLocked) return;
  state.answerLocked = true;
  state.totalAnswered++;
  state.streak = 0;
  renderStreakDots();
  SFX.stopTick();
  SFX.timeout();

  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b => b.disabled = true);
  allBtns[state.currentQuestion.a].classList.add('correct');

  showTimeoutEffect();
  setTimeout(() => showResult(false, state.currentQuestion, true), 2200);
}

function showResult(correct, q, timeout = false) {
  clearTimeout(window._timeoutOverlayTimer);
  const overlay = document.querySelector('.timeout-overlay');
  if (overlay) overlay.remove();

  document.getElementById('result-icon').textContent = correct ? '🎉' : (timeout ? '⏰' : '❌');
  document.getElementById('result-title').textContent = correct ? 'CORRETO!' : (timeout ? 'TEMPO ESGOTADO!' : 'ERROU!');
  document.getElementById('result-subtitle').textContent = correct
    ? `+${getPoints()} pontos ganhos!`
    : (timeout ? 'O tempo acabou!' : 'Não foi dessa vez...');

  document.getElementById('rs-total').textContent = state.totalAnswered;
  document.getElementById('rs-correct').textContent = state.totalCorrect;
  document.getElementById('rs-score').textContent = state.score;

  const ansBox = document.getElementById('result-answer-box');
  ansBox.className = 'result-answer-box' + (correct ? '' : ' wrong-box');
  document.getElementById('correct-answer-display').textContent = q.o[q.a];

  showScreen('result-screen');
}

function nextQuestion() {
  showScreen('game-screen');
  loadQuestion();
}

function stopGame() {
  if (confirm('Deseja parar e ver sua pontuação final?')) {
    clearTimer();
    showFinalScreen();
  }
}

function showFinalScreen() {
  document.getElementById('result-icon').textContent = '🏆';
  document.getElementById('result-title').textContent = 'JOGO ENCERRADO!';
  document.getElementById('result-subtitle').textContent = 'Você escolheu parar.';
  document.getElementById('rs-total').textContent = state.totalAnswered;
  document.getElementById('rs-correct').textContent = state.totalCorrect;
  document.getElementById('rs-score').textContent = state.score;
  document.getElementById('result-answer-box').style.display = 'none';
  showScreen('result-screen');
}

function restartGame() {
  document.getElementById('result-answer-box').style.display = '';
  showScreen('start-screen');
}

// ===================== TIMER =====================
function startTimer() {
  state.timeLeft = 60;
  updateTimerUI();
  SFX.startTick();
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerUI();
    if (state.timeLeft <= 10 && state.timeLeft > 0) {
      SFX.urgentTick();
    }
    if (state.timeLeft <= 0) {
      clearTimer();
      timeUp();
    }
  }, 1000);
}

function clearTimer() {
  SFX.stopTick();
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function updateTimerUI() {
  const t = state.timeLeft;
  document.getElementById('timer-num').textContent = t;
  document.getElementById('timer-bar').style.width = (t / 60 * 100) + '%';

  const circle = document.getElementById('timer-svg');
  const circumference = 251;
  const offset = circumference - (t / 60) * circumference;
  circle.style.strokeDashoffset = offset;

  // Color changes
  const numEl = document.getElementById('timer-num');
  if (t <= 10) {
    circle.style.stroke = '#e74c3c';
    numEl.style.color = '#e74c3c';
    numEl.style.animation = t <= 5 ? 'pulse-glow 0.5s infinite' : '';
  } else if (t <= 20) {
    circle.style.stroke = '#f39c12';
    numEl.style.color = '#f39c12';
  } else {
    circle.style.stroke = 'var(--gold)';
    numEl.style.color = 'var(--gold)';
    numEl.style.animation = '';
  }
}

// ===================== HELPERS =====================
function getPoints() {
  const base = { facil: 100, medio: 200, dificil: 400 };
  const diff = state.currentQuestion?.d || 'facil';
  const levelBonus = state.level * 10;
  const streakBonus = state.streak > 2 ? state.streak * 20 : 0;
  const timeBonus = Math.floor(state.timeLeft * 2);
  return (base[diff] || 100) + levelBonus + streakBonus + timeBonus;
}

function renderDiffDots() {
  const container = document.getElementById('diff-dots');
  container.innerHTML = '';
  const levelInCycle = ((state.level - 1) % 3) + 1;
  for (let i = 1; i <= 3; i++) {
    const d = document.createElement('div');
    d.className = 'diff-dot' + (i <= levelInCycle ? ' active' + (i === 3 ? ' hard' : i === 2 ? ' med' : '') : '');
    container.appendChild(d);
  }
}

function renderStreakDots() {
  const container = document.getElementById('streak-dots');
  container.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'sdot' + (i < state.streak ? ' lit' : '');
    container.appendChild(d);
  }
  if (state.streak >= 5) {
    container.innerHTML = '<span style="color:var(--gold);font-size:12px;letter-spacing:1px">🔥 ' + state.streak + 'x SEQUÊNCIA!</span>';
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===================== EFFECTS =====================
function launchConfetti() {
  const layer = document.getElementById('effects-layer');
  const colors = ['#f5c518','#27ae60','#3498db','#e74c3c','#9b59b6','#1abc9c','#ffffff','#f39c12'];
  const shapes = ['■', '●', '▲', '★', '♦'];

  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const size = Math.random() * 12 + 8;
    const left = Math.random() * 100;
    const duration = Math.random() * 2 + 1.5;
    const delay = Math.random() * 0.8;

    piece.style.cssText = `
      left: ${left}%;
      top: -20px;
      font-size: ${size}px;
      color: ${color};
      width: auto;
      height: auto;
      background: none;
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      text-shadow: 0 0 6px ${color};
    `;
    piece.textContent = shape;
    layer.appendChild(piece);
    setTimeout(() => piece.remove(), (duration + delay) * 1000 + 100);
  }
}

function launchWrongEffect() {
  const layer = document.getElementById('effects-layer');
  const overlay = document.createElement('div');
  overlay.className = 'wrong-overlay';
  layer.appendChild(overlay);

  // Lightning bolts ⚡
  for (let i = 0; i < 6; i++) {
    const bolt = document.createElement('div');
    bolt.style.cssText = `
      position: absolute;
      font-size: ${Math.random()*30+20}px;
      left: ${Math.random()*90}%;
      top: ${Math.random()*80}%;
      animation: bolt-fade 0.8s ease forwards;
      animation-delay: ${Math.random()*0.4}s;
      opacity: 0;
    `;
    bolt.textContent = '⚡';
    layer.appendChild(bolt);
    setTimeout(() => bolt.remove(), 1200);
  }

  // Add bolt keyframes if not added
  if (!document.getElementById('bolt-style')) {
    const style = document.createElement('style');
    style.id = 'bolt-style';
    style.textContent = `@keyframes bolt-fade {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      30% { transform: scale(1.3) rotate(0deg); opacity: 1; }
      100% { transform: scale(0.8) rotate(10deg); opacity: 0; }
    }`;
    document.head.appendChild(style);
  }

  setTimeout(() => overlay.remove(), 1000);
}

function showTimeoutEffect() {
  const layer = document.getElementById('effects-layer');
  const box = document.createElement('div');
  box.className = 'timeout-overlay';
  box.innerHTML = `
    <div class="timeout-box">
      <div class="timeout-icon">⏰</div>
      <div class="timeout-text">TEMPO ESGOTADO!</div>
      <div class="timeout-sub">O TEMPO ACABOU</div>
    </div>
  `;
  layer.appendChild(box);
  window._timeoutOverlayTimer = setTimeout(() => box.remove(), 2100);
}

// Start with start screen visible
showScreen('start-screen');
</script>
